name: CI

on:
  push:
    branches: [main, master, dev]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true

      - name: Run tests
        run: make test

  version:
    name: Compute Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      release: ${{ steps.v.outputs.release }}
      prerelease: ${{ steps.v.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute version
        id: v
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            # Explicit tag push: use the tag as-is, publish as latest release.
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == "refs/heads/master" ]]; then
            # Push to main: auto-increment the patch on the v1.0.x line.
            latest=$(git tag -l 'v1.0.*' --sort=-v:refname | head -n1)
            latest=${latest:-v1.0.0}
            patch=${latest##*.}
            next="v1.0.$((patch + 1))"
            echo "Latest v1.0.x tag: $latest -> next: $next"
            echo "version=$next" >> "$GITHUB_OUTPUT"
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == "refs/heads/dev" ]]; then
            # Push to dev: rolling pre-release.
            echo "version=dev" >> "$GITHUB_OUTPUT"
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            # PRs / other: build only, no release.
            echo "version=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, version]
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true

      - name: Build
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          if [ "${{ matrix.goarch }}" = "amd64" ]; then
            make build-linux
          else
            make build-linux-arm64
          fi

      - name: Upload xboard-node artifact
        uses: actions/upload-artifact@v4
        with:
          name: xboard-node-${{ matrix.goos }}-${{ matrix.goarch }}
          path: xboard-node-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Upload xbctl artifact
        uses: actions/upload-artifact@v4
        with:
          name: xbctl-${{ matrix.goos }}-${{ matrix.goarch }}
          path: xbctl-${{ matrix.goos }}-${{ matrix.goarch }}

  build-docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [test, version]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/restaurant8/xboard-node:latest
            ghcr.io/restaurant8/xboard-node:${{ github.sha }}
            ghcr.io/restaurant8/xboard-node:${{ needs.version.outputs.version }}

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build, version]
    if: needs.version.outputs.release == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.version }}
          make_latest: ${{ needs.version.outputs.prerelease == 'false' }}
          prerelease: ${{ needs.version.outputs.prerelease == 'true' }}
          files: |
            dist/xboard-node-linux-amd64
            dist/xboard-node-linux-arm64
            dist/xbctl-linux-amd64
            dist/xbctl-linux-arm64
